# Classifier Training Configuration

# Model settings
model_name: "efficientnet_b0"  # or mobilenet_v3_large
image_size: 224

# Training hyperparameters - Stage 1 (Feature Extraction)
stage1:
  epochs: 10
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  
# Training hyperparameters - Stage 2 (Fine-tuning)
stage2:
  epochs: 20
  batch_size: 32       # Smaller batch size for fine-tuning
  learning_rate: 0.0001 # 10x smaller learning rate
  weight_decay: 0.0001

# Hardware overrides
workers: 4
pin_memory: true
